<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; color: white; margin: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .card { border: 1px solid #666; padding: 10px; background: #222; text-align: center; }
  .container { width: 100%; aspect-ratio: 4/3; background: #FDF8F0; position: relative; overflow: hidden; }
  img { width: 100%; height: 100%; object-fit: contain; padding: 16px; box-sizing: border-box; }
</style>
</head>
<body>
<div class="grid">
  <div class="card"><h3>Choosing Groomer</h3><div class="container"><img src="maui-choosing-groomer-blog.png"></div></div>
  <div class="card"><h3>PNW Seasonal</h3><div class="container"><img src="maui-pnw-seasonal-blog.png"></div></div>
  <div class="card"><h3>Rain Mud</h3><div class="container"><img src="maui-rain-mud-blog.png"></div></div>
  <div class="card"><h3>Winter</h3><div class="container"><img src="maui-winter-grooming-blog.png"></div></div>
</div>
</body>
</html>
